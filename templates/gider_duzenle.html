<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gider Düzenle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2>✏️ Gider Düzenle</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Tarih</label>
                <input type="date" name="tarih" value="{{ gider.tarih|date:'Y-m-d' }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Açıklama</label>
                <input type="text" name="aciklama" value="{{ gider.aciklama }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Tutar</label>
                <input type="number" step="0.01" name="tutar" value="{{ gider.tutar }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Kategori</label>
                <input type="text" name="kategori" value="{{ gider.kategori }}" class="form-control">
            </div>

            <button class="btn btn-warning">
                Güncelle
            </button>

        </form>

    </div>
</div>

</body>
</html>
